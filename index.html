<body>
    <div class="container">
        <button class="hamburger-btn no-print" onclick="toggleSidebar()">☰</button>

        <div class="sidebar-overlay no-print" id="overlay" onclick="closeSidebar()"></div>

        <div class="sidebar no-print" id="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-title">📋 Info Usaha</div>
                <button class="close-btn" onclick="closeSidebar()">✕</button>
            </div>

            <div class="bluetooth-section">
                <div class="bluetooth-title">🔵 Printer: SAPRINT</div>
                <button class="btn-bluetooth" onclick="cariBluetooth()">Cari & Konek Printer</button>
                <div class="printer-status" id="printerStatus">Belum terhubung</div>
            </div>

            <div class="form-group">
                <label>Nama Usaha</label>
                <input type="text" id="namaToko" placeholder="" oninput="updateStruk()">
            </div>

            <div class="form-group">
                <label>No. HP / WhatsApp</label>
                <input type="text" id="hpToko" placeholder="" oninput="updateStruk()">
            </div>

            <div class="form-group">
                <label>Alamat Lengkap</label>
                <textarea id="alamatToko" rows="3" placeholder="" oninput="updateStruk()"></textarea>
            </div>

            <div class="form-group">
                <label>Nama Kasir</label>
                <input type="text" id="kasir" placeholder="" oninput="updateStruk()">
            </div>

            <div class="form-group">
                <label>No. Struk</label>
                <input type="text" id="noStruk" readonly>
            </div>

            <button class="btn btn-danger" onclick="hapusSemuaData()">🗑️ Hapus Semua Data</button>
        </div>

        <div class="form-section no-print">
            <h1>SYAHRUL ARIPRINT</h1>
            <p class="subtitle">CATAT SEMUA TRANSAKSI & PRINT</p>

            <div class="section-title">Detail Item</div>
            <div id="itemList"></div>
            <button class="btn btn-add" onclick="tambahItem()">+ Tambah Item Baru</button>

            <div class="section-title">Pembayaran</div>
            <div class="form-row">
                <div class="form-group">
                    <label>Diskon (%)</label>
                    <input type="number" id="diskon" placeholder="0" min="0" max="100" step="0.1" inputmode="decimal" oninput="updateStruk()">
                </div>
                <div class="form-group">
                    <label>Bayar (Rp)</label>
                    <input type="text" id="bayar" placeholder="0" inputmode="numeric" oninput="updateStruk()">
                </div>
            </div>

            <div class="total-summary" id="totalSummary"></div>

            <button class="btn btn-primary" onclick="cetakBluetooth()">🖨️ PRINT BLUETOOTH</button>
            <button class="btn btn-secondary" onclick="exportPDF()">📄 DOWNLOAD PDF</button>
        </div>

        <div class="struk-wrapper">
            <div class="struk-preview" id="struk"></div>
        </div>
    </div>

    <script>
        const { jsPDF } = window.jspdf;
        let items = [{ nama: '', qty: '', harga: '' }];
        let printerDevice = null;

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('active');
            document.getElementById('overlay').classList.toggle('active');
        }

        function closeSidebar() {
            document.getElementById('sidebar').classList.remove('active');
            document.getElementById('overlay').classList.remove('active');
        }

        async function cariBluetooth() {
            try {
                document.getElementById('printerStatus').textContent = 'Mencari SAPRINT...';
                printerDevice = await navigator.bluetooth.requestDevice({
                    filters: [{ namePrefix: 'SAPRINT' }, { services: ['000018f0-0000-1000-8000-00805f9b34fb'] }],
                    optionalServices: ['000018f0-0000-1000-8000-00805f9b34fb']
                });

                document.getElementById('printerStatus').textContent = `✓ Terhubung: ${printerDevice.name}`;
                document.getElementById('printerStatus').classList.add('connected');

                printerDevice.addEventListener('gattserverdisconnected', () => {
                    document.getElementById('printerStatus').textContent = 'Printer terputus';
                    document.getElementById('printerStatus').classList.remove('connected');
                });

            } catch (error) {
                document.getElementById('printerStatus').textContent = 'Gagal: ' + error.message;
            }
        }

        async function cetakBluetooth() {
            if (!printerDevice) {
                alert('Hubungkan printer SAPRINT dulu di menu ☰');
                toggleSidebar();
                return;
            }

            try {
                const server = await printerDevice.gatt.connect();
                const service = await server.getPrimaryService('000018f0-0000-1000-8000-00805f9b34fb');
                const characteristic = await service.getCharacteristic('00002af1-0000-1000-8000-00805f9b34fb');

                const strukText = generateStrukText();
                const encoder = new TextEncoder();
                const data = encoder.encode(strukText + '\n\n\n');

                await characteristic.writeValue(data);
                alert('✅ Struk berhasil dicetak ke SAPRINT!');

            } catch (error) {
                alert('❌ Gagal cetak: ' + error.message);
            }
        }

        function generateStrukText() {
            const namaToko = document.getElementById('namaToko').value || 'SYAHRUL ARIPRINT';
            const alamat = document.getElementById('alamatToko').value || '';
            const hp = document.getElementById('hpToko').value || '';
            const kasir = document.getElementById('kasir').value || 'Kasir';
            const noStruk = document.getElementById('noStruk').value;
            const { diskon, bayar, total, kembalian } = hitungTotal();

            const now = new Date();
            const tanggal = now.toLocaleDateString('id-ID', { day: '2-digit', month: 'short', year: 'numeric' });
            const jam = now.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' });

            let text = `${namaToko}\n${alamat}\n${hp}\n`;
            text += `--------------------------------\n`;
            text += `No: ${noStruk}\n${tanggal} ${jam} ${kasir}\n`;
            text += `--------------------------------\n`;

            items.forEach(item => {
                const qty = parseFloat(item.qty) || 0;
                const harga = parseFloat(item.harga) || 0;
                if (item.nama && qty > 0) {
                    const totalItem = qty * harga;
                    text += `${item.nama}\n`;
                    text += `${qty} x ${harga.toLocaleString('id-ID')} ${totalItem.toLocaleString('id-ID')}\n`;
                }
            });

            text += `--------------------------------\n`;
            if (diskon > 0) text += `Diskon: -${diskon.toLocaleString('id-ID')}\n`;
            text += `TOTAL: ${total.toLocaleString('id-ID')}\n`;
            text += `--------------------------------\n`;
            text += `Bayar: ${bayar.toLocaleString('id-ID')}\n`;
            text += `Kembali: ${(kembalian > 0? kembalian : 0).toLocaleString('id-ID')}\n`;
            text += `--------------------------------\n`;
            text += `TERIMA KASIH\n`;

            return text;
        }

        function hapusSemuaData() {
            if (confirm('Yakin hapus semua data transaksi?')) {
                items = [{ nama: '', qty: '', harga: '' }];
                document.getElementById('diskon').value = '';
                document.getElementById('bayar').value = '';
                renderItems();
                updateStruk();
            }
        }

        function formatInputRupiah(angka) {
            let number_string = angka.replace(/[^,\d]/g, '').toString();
            let split = number_string.split(',');
            let sisa = split[0].length % 3;
            let rupiah = split[0].substr(0, sisa);
            let ribuan = split[0].substr(sisa).match(/\d{3}/gi);

            if (ribuan) {
                let separator = sisa? '.' : '';
                rupiah += separator + ribuan.join('.');
            }

            rupiah = split[1]!= undefined? rupiah + ',' + split[1] : rupiah;
            return rupiah;
        }

        function unformatRupiah(rupiah) {
            return parseInt(rupiah.replace(/[^0-9]/g, '')) || 0;
        }

        function formatRupiah(num) {
            return 'Rp ' + num.toLocaleString('id-ID');
        }

        function generateNoStruk() {
            const now = new Date();
            const tgl = now.getDate().toString().padStart(2, '0');
            const bln = (now.getMonth() + 1).toString().padStart(2, '0');
            const thn = now.getFullYear().toString().slice(-2);
            const jam = now.getHours().toString().padStart(2, '0');
            const mnt = now.getMinutes().toString().padStart(2, '0');
            document.getElementById('noStruk').value = `INV${thn}${bln}${tgl}${jam}${mnt}`;
        }

        function tambahItem() {
            items.push({ nama: '', qty: '', harga: '' });
            renderItems();
        }

        function hapusItem(index) {
            items.splice(index, 1);
            if (items.length === 0) items.push({ nama: '', qty: '', harga: '' });
            renderItems();
        }

        function updateItem(index, field, value) {
            if (field === 'harga') {
                items[index][field] = unformatRupiah(value);
                document.getElementById(`harga-${index}`).value = value? formatInputRupiah(value) : '';
            } else if (field === 'nama') {
                items[index][field] = value;
            } else {
                items[index][field] = parseFloat(value) || '';
            }
            updateStruk();
        }

        function renderItems() {
            const list = document.getElementById('itemList');
            list.innerHTML = items.map((item, i) => {
                return `
                    <div class="item-card">
                        <div class="item-card-header">
                            <div class="item-number">${i + 1}</div>
                            <button type="button" class="btn-del" onclick="hapusItem(${i})">Hapus</button>
                        </div>

                        <div class="form-group">
                            <label>Nama Barang</label>
                            <input type="text" placeholder="" value="${item.nama}" oninput="updateItem(${i}, 'nama', this.value)">
                        </div>

                        <div class="item-grid">
                            <div class="form-group">
                                <label>Jumlah</label>
                                <input type="number" step="0.1" placeholder="" value="${item.qty}" inputmode="decimal" oninput="updateItem(${i}, 'qty', this.value)">
                            </div>
                            <div class="form-group">
                                <label>Harga Rp.</label>
                                <input type="text" id="harga-${i}" placeholder="" value="${item.harga? formatInputRupiah(item.harga.toString()) : ''}" inputmode="numeric" oninput="updateItem(${i}, 'harga', this.value)">
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
            updateStruk();
        }

        function hitungTotal() {
            let subtotal = 0;
            let totalItem = 0;

            items.forEach(item => {
                const qty = parseFloat(item.qty) || 0;
                const harga = parseFloat(item.harga) || 0;
                if (item.nama && qty > 0) {
                    subtotal += qty * harga;
                    totalItem++;
                }
            });

            const diskonPersen = parseFloat(document.getElementById('diskon').value) || 0;
            const diskon = subtotal * (diskonPersen / 100);
            const bayar = unformatRupiah(document.getElementById('bayar').value) || 0;
            const total = subtotal - diskon;
            const kembalian = bayar - total;

            return { subtotal, totalItem, diskon, bayar, total, kembalian, diskonPersen };
        }

        function updateStruk() {
            const namaToko = document.getElementById('namaToko').value || 'SYAHRUL ARIPRINT';
            const alamat = document.getElementById('alamatToko').value || 'Alamat Usaha';
            const hp = document.getElementById('hpToko').value || '08xx-xxxx';
            const kasir = document.getElementById('kasir').value || 'Kasir';
            const noStruk = document.getElementById('noStruk').value;

            document.getElementById('bayar').value = unformatRupiah(document.getElementById('bayar').value) > 0? formatInputRupiah(unformatRupiah(document.getElementById('bayar').value).toString()) : '';

            const now = new Date();
            const tanggal = now.toLocaleDateString('id-ID', { day: '2-digit', month: 'short', year: 'numeric' });
            const jam = now.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' });

            let itemHTML = '';
            items.forEach(item => {
                const qty = parseFloat(item.qty) || 0;
                const harga = parseFloat(item.harga) || 0;
                if (item.nama && qty > 0) {
                    const total = qty * harga;
                    itemHTML += `
                        <div>${item.nama}</div>
                        <div class="row small">
                            <span>${qty} x ${harga.toLocaleString('id-ID')}</span>
                            <span>${total.toLocaleString('id-ID')}</span>
                        </div>
                    `;
                }
            });

            const { subtotal, totalItem, diskon, bayar, total, kembalian, diskonPersen } = hitungTotal();

            document.getElementById('totalSummary').innerHTML = `
                <div class="total-summary-row">
                    <span>Total Item:</span>
                    <span>${totalItem} jenis</span>
                </div>
                ${diskon > 0? `<div class="total-summary-row"><span>Diskon (${diskonPersen}%):</span><span>-${formatRupiah(diskon)}</span></div>` : ''}
                <div class="total-summary-row grand">
                    <span>TOTAL:</span>
                    <span>${formatRupiah(total)}</span>
                </div>
            `;

            document.getElementById('struk').innerHTML = `
                <div class="struk-header">
                    <h2>${namaToko}</h2>
                    <div class="center small">${alamat}</div>
                    <div class="center small">${hp}</div>
                </div>
                <div class="line"></div>
                <div class="row small"><span>No: ${noStruk}</span></div>
                <div class="row small"><span>${tanggal} ${jam}</span><span>${kasir}</span></div>
                <div class="line"></div>
                ${itemHTML || '<div class="center small">Belum ada item</div>'}
                <div class="line"></div>
                ${diskon > 0? `<div class="row"><span>Diskon ${diskonPersen}%</span><span>-${diskon.toLocaleString('id-ID')}</span></div>` : ''}
                <div class="struk-total-section">
                    <div class="row"><span>TOTAL</span><span>${total.toLocaleString('id-ID')}</span></div>
                </div>
                <div class="row"><span>Bayar</span><span>${bayar.toLocaleString('id-ID')}</span></div>
                <div class="row"><span>Kembali</span><span>${(kembalian > 0? kembalian : 0).toLocaleString('id-ID')}</span></div>
                <div class="struk-footer">
                    <div class="center bold">TERIMA KASIH</div>
                    <div class="center small">Powered by SYAHRUL ARIPRINT</div>
                </div>
            `;
        }

        function exportPDF() {
            const doc = new jsPDF({ format: 'a4' });
            const namaToko = document.getElementById('namaToko').value || 'SYAHRUL ARIPRINT';
            const alamat = document.getElementById('alamatToko').value || 'Alamat Usaha';
            const hp = document.getElementById('hpToko').value || '08xx-xxxx';
            const kasir = document.getElementById('kasir').value || 'Kasir';
            const noStruk = document.getElementById('noStruk').value;
            const { diskon, bayar, total, kembalian, diskonPersen } = hitungTotal();

            const now = new Date();
            const tanggal = now.toLocaleDateString('id-ID', { day: '2-digit', month: 'long', year: 'numeric' });
            const jam = now.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' });

            let y = 20;
            doc.setFontSize(18);
            doc.setFont('helvetica', 'bold');
            doc.text(namaToko, 105, y, { align: 'center' });

            y += 7;
            doc.setFontSize(10);
            doc.setFont('helvetica', 'normal');
            doc.text(alamat, 105, y, { align: 'center' });
            y += 5;
            doc.text(hp, 105, y, { align: 'center' });

            y += 8;
            doc.line(20, y, 190, y);

            y += 7;
            doc.text(`No. Struk: ${noStruk}`, 20, y);
            y += 5;
            doc.text(`Tanggal: ${tanggal} ${jam}`, 20, y);
            doc.text(`Kasir: ${kasir}`, 190, y, { align: 'right' });

            y += 8;
            doc.line(20, y, 190, y);

            y += 7;
            doc.setFont('helvetica', 'bold');
            doc.text('Item', 20, y);
            doc.text('Qty', 120, y);
            doc.text('Harga', 145, y);
            doc.text('Total', 190, y, { align: 'right' });

            y += 2;
            doc.line(20, y, 190, y);

                        doc.setFont('helvetica', 'normal');
            items.forEach(item => {
                const qty = parseFloat(item.qty) || 0;
                const harga = parseFloat(item.harga) || 0;
                if (item.nama && qty > 0) {
                    const totalItem = qty * harga;
                    y += 7;
                    doc.text(item.nama, 20, y);
                    doc.text(qty.toString(), 120, y);
                    doc.text(harga.toLocaleString('id-ID'), 145, y);
                    doc.text(totalItem.toLocaleString('id-ID'), 190, y, { align: 'right' });
                }
            });
            
            y += 5;
            doc.line(20, y, 190, y);
            
            if (diskon > 0) {
                y += 7;
                doc.text(`Diskon ${diskonPersen}%:`, 145, y);
                doc.text(`-${diskon.toLocaleString('id-ID')}`, 190, y, { align: 'right' });
            }
            
            y += 7;
            doc.setFont('helvetica', 'bold');
            doc.text('TOTAL:', 145, y);
            doc.text(total.toLocaleString('id-ID'), 190, y, { align: 'right' });
            
            y += 7;
            doc.setFont('helvetica', 'normal');
            doc.text('Bayar:', 145, y);
            doc.text(bayar.toLocaleString('id-ID'), 190, y, { align: 'right' });
            y += 5;
            doc.text('Kembali:', 145, y);
            doc.text((kembalian > 0 ? kembalian : 0).toLocaleString('id-ID'), 190, y, { align: 'right' });
            
            y += 15;
            doc.setFontSize(9);
            doc.text('Terima kasih atas kunjungan Anda', 105, y, { align: 'center' });
            y += 5;
            doc.text('Powered by SYAHRUL ARIPRINT', 105, y, { align: 'center' });
            
            doc.setGState(new doc.GState({ opacity: 0.05 }));
            doc.setFontSize(60);
            doc.setFont('helvetica', 'bold');
            doc.setTextColor(14, 165, 233);
            doc.text('SYAHRUL ARIPRINT', 105, 150, { align: 'center', angle: -45 });
            
            doc.save(`Struk-${noStruk}.pdf`);
            }
            
            // Init
            generateNoStruk();
            renderItems();
            setInterval(generateNoStruk, 60000);
            </script>
            <script>
    // Register Service Worker
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('/syahrulariprint/sw.js')
                .then(reg => console.log('SW registered'))
                .catch(err => console.log('SW failed', err));
        });
    }
    
    // Auto Install Prompt
    let deferredPrompt;
    window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;
        
        // Langsung munculin popup install setelah 3 detik
        setTimeout(() => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                deferredPrompt.userChoice.then((choiceResult) => {
                    if (choiceResult.outcome === 'accepted') {
                        console.log('User accepted install');
                    }
                    deferredPrompt = null;
                });
            }
        }, 3000);
    });
</script>
